<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Phalanx — Mobile</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Phalanx&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23000&quot;,&quot;theme_color&quot;:&quot;%23000&quot;}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%}
:root{
  --accent:#5f8fad;--green:#4a9a65;--amber:#a89540;--red:#b85454;
  --mono:'SF Mono','Fira Code','Consolas','JetBrains Mono',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{height:100%;overflow:hidden;position:fixed;inset:0}
body{height:100%;overflow:hidden;position:fixed;inset:0;font-family:var(--sans);background:#000;color:#fff;-webkit-font-smoothing:antialiased;touch-action:none}

/* ═══════ MAP — Leaflet, full screen ═══════ */
#map{position:fixed;inset:0;z-index:1;transition:transform 1.6s cubic-bezier(.3,0,.15,1)}
body.drawer-open #map{transform:translateY(calc(var(--drawer-h) / -2))}
:root{--drawer-h:30vh}
/* Hide Leaflet UI chrome */
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
.map-scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:2}

/* Crosshair */
.crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;pointer-events:none;z-index:3}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.08)}
.crosshair::before{width:1px;height:100%;left:50%}
.crosshair::after{height:1px;width:100%;top:50%}

/* ═══════ TOP GRADIENT ═══════ */
.top-grad{position:fixed;top:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,rgba(0,0,0,.25) 60%,transparent 100%);pointer-events:none;z-index:10}
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;height:36px;display:flex;align-items:center;padding:0 14px;gap:6px;pointer-events:none}
.topbar .logo{font-weight:700;font-size:13px;color:#fff;letter-spacing:-.02em}
.topbar .dot{width:5px;height:5px;border-radius:50%}
.topbar .telem{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.3px;display:flex;gap:8px;white-space:nowrap}
.topbar .tv{color:rgba(255,255,255,.6);font-weight:500}
.topbar .tg{color:var(--green)}
.topbar .pill{margin-left:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:3px}
.pill-dot{width:4px;height:4px;border-radius:50%}
.pause-btn{position:fixed;top:42px;right:14px;z-index:20;padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:500;border:1px solid rgba(184,84,84,.25);background:rgba(0,0,0,.5);color:var(--red);display:flex;align-items:center;gap:3px;pointer-events:auto}
.pause-btn .material-symbols-outlined{font-size:12px}

/* ═══════ VIEW TOGGLE THUMBNAIL ═══════ */
.view-thumb{
  position:fixed;top:42px;left:14px;z-index:20;
  width:80px;height:56px;border-radius:6px;
  overflow:hidden;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.15);
  box-shadow:0 2px 12px rgba(0,0,0,.5);
  transition:transform .2s ease,box-shadow .2s ease;
}
.view-thumb:active{transform:scale(.95)}
.view-thumb img,.view-thumb .thumb-map{width:100%;height:100%;object-fit:cover;display:block}
.view-thumb .thumb-map{background:#1a1a1a url('satellite.png') center/cover no-repeat}
.view-thumb .thumb-label{
  position:absolute;bottom:3px;left:5px;
  font-family:var(--mono);font-size:7px;font-weight:600;
  color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
}

/* FPV fullscreen overlay — hidden by default */
.fpv-view{
  position:fixed;inset:0;z-index:1;
  background:#0a0a0a url('aerial.jpg') center/cover no-repeat;
  display:none;
}
.fpv-view.active{display:block}
.fpv-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none}
.fpv-hud{position:absolute;top:50px;left:14px;right:14px;bottom:50px;border:1px solid rgba(255,255,255,.04);pointer-events:none}
.fpv-hud .hud-corner{position:absolute;width:14px;height:14px;border-color:rgba(255,255,255,.18);border-style:solid}
.fpv-hud .hud-tl{top:0;left:0;border-width:2px 0 0 2px}
.fpv-hud .hud-tr{top:0;right:0;border-width:2px 2px 0 0}
.fpv-hud .hud-bl{bottom:0;left:0;border-width:0 0 2px 2px}
.fpv-hud .hud-br{bottom:0;right:0;border-width:0 2px 2px 0}
.fpv-crosshair{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;pointer-events:none}
.fpv-crosshair::before,.fpv-crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.1)}
.fpv-crosshair::before{width:1px;height:100%;left:50%}
.fpv-crosshair::after{height:1px;width:100%;top:50%}
.hud-text{position:absolute;font-family:var(--mono);font-size:9px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.5px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.hud-text-tl{top:56px;left:20px}
.hud-text-tr{top:56px;right:20px;text-align:right}
.hud-text-bl{bottom:56px;left:20px}
.hud-text-br{bottom:56px;right:20px;text-align:right}

/* Map also transitions when FPV is active */
.fpv-view.active ~ #map{pointer-events:none}

/* ═══════ BOTTOM GRADIENT ═══════ */
.bottom-grad{position:fixed;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 50%,transparent 100%);pointer-events:none;z-index:10;transition:opacity .4s ease}
body.drawer-open .bottom-grad{opacity:0}

/* ═══════ BOTTOM DRAG HANDLE — centered pill, pull up to open drawer ═══════ */
.drag-bar{
  position:fixed;bottom:max(6px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:115;
  width:100px;height:44px;
  cursor:grab;touch-action:none;
  transition:opacity .3s;
  display:flex;align-items:center;justify-content:center;
}
.drag-bar::after{
  content:'';width:48px;height:5px;border-radius:3px;background:rgba(255,255,255,.35);
}
body.drawer-open .drag-bar{opacity:0;pointer-events:none}

/* ═══════ SARA TOAST — appears above buttons when drawer is closed ═══════ */
.sara-toast{
  position:fixed;
  bottom:max(100px,calc(env(safe-area-inset-bottom) + 76px));
  left:16px;right:100px;z-index:15;
  background:rgba(12,12,14,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(95,143,173,.15);
  border-left:2px solid rgba(95,143,173,.3);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;line-height:1.45;color:rgba(255,255,255,.85);
  cursor:pointer;
  transform:translateY(20px);opacity:0;
  transition:transform .4s cubic-bezier(.32,.72,0,1),opacity .4s ease;
  pointer-events:none;
}
.sara-toast.visible{transform:translateY(0);opacity:1;pointer-events:auto}
.sara-toast .toast-label{
  font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;
  display:flex;align-items:center;gap:4px;
}
.sara-toast .toast-label .material-symbols-outlined{font-size:11px}
body.drawer-open .sara-toast{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ═══════ FAB — Floating Action Button ═══════ */
.fab{
  position:fixed;bottom:max(24px,env(safe-area-inset-bottom));right:20px;z-index:110;
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#3d6b85 0%,#2d5a74 100%);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;
  box-shadow:0 4px 20px rgba(61,107,133,.4),0 2px 8px rgba(0,0,0,.3);
  transition:all .25s cubic-bezier(.32,.72,0,1);
}
.fab .material-symbols-outlined{font-size:28px;color:#fff;transition:all .2s}
/* Idle pulse ring */
.fab::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid rgba(61,107,133,.3);
  animation:fabIdle 3s ease infinite;
}
@keyframes fabIdle{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.15);opacity:0}}

/* Active — recording */
.fab.active{
  background:linear-gradient(135deg,#b85454 0%,#8a3e3e 100%);
  box-shadow:0 4px 30px rgba(184,84,84,.5),0 0 60px rgba(184,84,84,.15);
  transform:scale(1.08);
}
.fab.active::before{
  border-color:rgba(184,84,84,.4);
  animation:fabActive 1s ease infinite;
}
@keyframes fabActive{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:0}}

/* Processing — after release */
.fab.processing{
  background:linear-gradient(135deg,#3d6b85 0%,#2d5a74 100%);
  transform:scale(1);
}
.fab.processing::before{animation:none;opacity:0}
.fab.processing .material-symbols-outlined{animation:fabSpin .8s linear infinite}
@keyframes fabSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Drawer-open mode — FAB becomes close button */
.fab.close-mode{
  background:rgba(255,255,255,.08);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  width:48px;height:48px;
  bottom:max(16px,env(safe-area-inset-bottom));right:16px;
}
.fab.close-mode::before{animation:none;opacity:0}
.fab.close-mode .material-symbols-outlined{font-size:24px;color:rgba(255,255,255,.5)}

/* ═══════ DRAWER ═══════ */
.drawer-scrim{position:fixed;inset:0;z-index:80;background:transparent;opacity:0;pointer-events:none;transition:opacity .35s}
.drawer-scrim.on{opacity:1;pointer-events:auto}

.drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  height:var(--drawer-h);
  background:#0c0c0e;
  border-top-left-radius:14px;border-top-right-radius:14px;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
  touch-action:none;
  box-shadow:none;
  overflow:hidden;
}
/* Solid black backdrop behind rounded corners */
.drawer::before{content:'';position:absolute;bottom:0;left:0;right:0;height:100%;background:#000;z-index:-1;border-radius:0}
.drawer.open{transform:translateY(0)}

/* Handle */
.drawer-handle-area{padding:10px 0 6px;flex-shrink:0;display:flex;justify-content:center;cursor:grab}
.drawer-handle{width:32px;height:3px;background:rgba(255,255,255,.18);border-radius:2px}

/* ═══════ CHAT HISTORY ═══════ */
.chat-history{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 120px 16px;overscroll-behavior:contain;display:flex;flex-direction:column;justify-content:flex-end;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 15%,black 30%);mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 15%,black 30%)}
.chat-history::-webkit-scrollbar{display:none}

/* Message bubbles with hierarchy */
.ch-msg{margin-bottom:2px;padding:10px 0;position:relative}
.ch-msg+.ch-msg{border-top:1px solid rgba(255,255,255,.03)}

/* SARA — left, accent indicator, max-width so it doesn't stretch full */
.ch-msg.sara{padding-left:10px;border-left:2px solid rgba(95,143,173,.25);max-width:82%}
.ch-msg.sara .ch-role{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.ch-msg.sara .ch-role .material-symbols-outlined{font-size:11px}
.ch-msg.sara .ch-text{font-size:13px;line-height:1.5;color:rgba(255,255,255,.92)}

/* USER — right-aligned, max-width, pushed to right */
.ch-msg.user{text-align:right;padding-right:10px;border-right:2px solid rgba(255,255,255,.12);border-left:none;max-width:82%;margin-left:auto}
.ch-msg.user .ch-role{font-family:var(--mono);font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.ch-msg.user .ch-role .material-symbols-outlined{font-size:11px}
.ch-msg.user .ch-text{font-size:13px;line-height:1.5;color:rgba(255,255,255,.45)}

/* ═══════ LIVE ELEMENTS — inserted into chatHistory during recording ═══════ */

/* Slide-in animation for new messages */
.ch-msg.fade-in{animation:fadeIn .25s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Live waveform — inline with YOU label, small horizontal bars */
.live-waveform{display:inline-flex;align-items:center;gap:1.5px;height:12px;margin-right:6px;vertical-align:middle;transition:opacity .3s}
.live-waveform span{width:2px;border-radius:1px;background:var(--red);animation:wave .7s ease-in-out infinite}
@keyframes wave{0%,100%{height:3px}50%{height:11px}}
.live-waveform span:nth-child(1){animation-delay:0s}.live-waveform span:nth-child(2){animation-delay:.08s}
.live-waveform span:nth-child(3){animation-delay:.16s}.live-waveform span:nth-child(4){animation-delay:.04s}
.live-waveform span:nth-child(5){animation-delay:.12s}.live-waveform span:nth-child(6){animation-delay:.2s}
.live-waveform span:nth-child(7){animation-delay:.06s}.live-waveform span:nth-child(8){animation-delay:.14s}
.live-waveform.off{opacity:0;pointer-events:none}

/* Scan line */
.live-scan{height:2px;margin:8px 0;overflow:hidden;opacity:0;transition:opacity .3s}
.live-scan.visible{opacity:1}
.live-scan .bar{height:100%;width:50px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanMove 1.2s ease-out forwards}
@keyframes scanMove{from{transform:translateX(-50px)}to{transform:translateX(calc(100vw + 50px))}}

/* Word-by-word animation */
.ch-msg .w{display:inline;animation:wordIn .2s ease both}
@keyframes wordIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* Dimmed user text after transcription complete */
.ch-msg.user.dimmed .ch-text{color:rgba(255,255,255,.35);transition:color .4s ease}

/* Bottom controls — always visible, left of FAB */
.bottom-controls{position:fixed;bottom:max(38px,calc(env(safe-area-inset-bottom) + 14px));left:16px;z-index:110;display:flex;gap:8px}
.bottom-controls .btn-icon{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.bottom-controls .btn-icon .material-symbols-outlined{font-size:18px;color:rgba(255,255,255,.4)}
</style>
</head>
<body>

<!-- FPV VIEW — fullscreen drone camera, hidden by default -->
<div class="fpv-view" id="fpvView">
  <div class="fpv-scanlines"></div>
  <div class="fpv-crosshair"></div>
  <div class="fpv-hud">
    <div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
    <div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>
  </div>
  <div class="hud-text hud-text-tl">ALT 120m · SPD 45 km/h</div>
  <div class="hud-text hud-text-tr">HEADING 247° NW</div>
  <div class="hud-text hud-text-bl">REC · 00:04:23</div>
  <div class="hud-text hud-text-br">DSA-128 · SEARCHING</div>
</div>

<!-- MAP — Leaflet satellite, full screen, real pinch/zoom/pan -->
<div id="map"></div>
<div class="map-scan"></div>
<div class="crosshair"></div>

<!-- VIEW TOGGLE THUMBNAIL -->
<div class="view-thumb" id="viewThumb" onclick="toggleView()">
  <img src="aerial.jpg" id="thumbImg" alt="FPV">
  <div class="thumb-label" id="thumbLabel">FPV</div>
</div>

<!-- TOP -->
<div class="top-grad"></div>
<div class="topbar">
  <span class="logo">Phalanx</span>
  <span class="dot" style="background:var(--green)"></span>
  <span class="telem">
    <span>ALT <span class="tv">120m</span></span>
    <span>SPD <span class="tv">45</span></span>
    <span>BAT <span class="tv tg">87%</span></span>
    <span>PROG <span class="tv">25%</span></span>
  </span>
  <div class="pill"><span class="pill-dot" style="background:var(--green)"></span>DSA-128</div>
</div>
<button class="pause-btn"><span class="material-symbols-outlined">pause_circle</span> Pause</button>

<!-- BOTTOM -->
<div class="bottom-grad"></div>

<!-- DRAG BAR — pull up to open drawer -->
<div class="drag-bar" id="dragBar"></div>

<!-- SARA TOAST — last SARA message when drawer is closed -->
<div class="sara-toast" id="saraToast">
  <div class="toast-label"><span class="material-symbols-outlined">volume_up</span> SARA</div>
  <div id="toastText"></div>
</div>

<!-- BOTTOM CONTROLS — always visible -->
<div class="bottom-controls">
  <div class="btn-icon"><span class="material-symbols-outlined">keyboard</span></div>
  <div class="btn-icon"><span class="material-symbols-outlined">more_horiz</span></div>
</div>
<button class="fab" id="fab"><span class="material-symbols-outlined" id="fabIcon">mic</span></button>

<!-- DRAWER -->
<div class="drawer-scrim" id="scrim"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle-area" id="handleArea"><div class="drawer-handle"></div></div>
  <div class="chat-history" id="chatHistory"></div>
</div>

<script>
// ═══════ STATE ═══════
let open=false, recording=false, wt=null, demoIdx=0;
const wait = ms => new Promise(r => setTimeout(r, ms));

// Start with empty chat — user builds it up through interactions
const msgs=[];

// Multiple scripted exchanges — each PTT press plays the next one
// Intersection of Washington Blvd & Dupont St, Pasadena
const WASHINGTON_DUPONT = [34.1502, -118.1398];
const DRONE_START = [34.1478, -118.1445];

// ═══════ VIEW TOGGLE — MAP ↔ FPV ═══════
let isFpv=false;
function toggleView(){
  isFpv=!isFpv;
  const fpv=document.getElementById('fpvView');
  const mapEl=document.getElementById('map');
  const scan=document.querySelector('.map-scan');
  const cross=document.querySelector('.crosshair');
  const thumb=document.getElementById('thumbImg');
  const label=document.getElementById('thumbLabel');

  if(isFpv){
    fpv.classList.add('active');
    mapEl.style.opacity='0';
    scan.style.opacity='0';
    cross.style.opacity='0';
    // Thumbnail shows map
    thumb.src='satellite.png';
    label.textContent='MAP';
  } else {
    fpv.classList.remove('active');
    mapEl.style.opacity='1';
    scan.style.opacity='1';
    cross.style.opacity='1';
    // Thumbnail shows FPV
    thumb.src='aerial.jpg';
    label.textContent='FPV';
  }
}

const exchanges=[
  {
    user:["How","much","of","the","search","area","have","we","covered?"],
    sara:["We've","covered","about","25%","of","the","zone.","Northeastern","quadrant","still","unscanned."],
    mapAction: null
  },
  {
    user:["Focus","on","the","intersection","of","Washington","and","Dupont.","I","think","the","car","might","be","there."],
    sara:["Confirmed.","Rerouting","to","Washington","and","Dupont","for","observation."],
    mapAction: 'flyToIntersection'
  },
  {
    user:["I","see","something.","Can","you","get","closer","to","that","red","vehicle?"],
    sara:["Moving","in.","Descending","to","60","meters","for","closer","visual."],
    mapAction: 'zoomIn'
  },
  {
    user:["That's","it.","That's","the","target.","Lock","on","and","orbit."],
    sara:["Target","acquired.","Entering","orbit","mode.","Maintaining","visual","contact","with","red","SUV."],
    mapAction: 'targetAcquired'
  },
  {
    user:["The","vehicle","is","moving.","Follow","it","and","maintain","orbit."],
    sara:["Tracking.","Vehicle","heading","southbound","on","Dupont.","Matching","speed","and","maintaining","safe","distance."],
    mapAction: 'followVehicle'
  },
];

// ═══════ HELPERS — append messages directly into chatHistory ═══════
function appendUserMsg(){
  const el=document.createElement('div');
  el.className='ch-msg user fade-in';
  // Waveform lives INSIDE the user message — no layout shift when removed
  const wfHTML = Array.from({length:8}, (_,i) => {
    const delays=[0,.08,.16,.04,.12,.2,.06,.14];
    return `<span style="animation-delay:${delays[i]}s"></span>`;
  }).join('');
  el.innerHTML=`<div class="ch-role"><div class="live-waveform">${wfHTML}</div>YOU<span class="material-symbols-outlined">mic</span></div><div class="ch-text"></div>`;
  document.getElementById('chatHistory').appendChild(el);
  return el.querySelector('.ch-text');
}
function appendSaraMsg(){
  const el=document.createElement('div');
  el.className='ch-msg sara fade-in';
  el.innerHTML='<div class="ch-role"><span class="material-symbols-outlined">volume_up</span>SARA</div><div class="ch-text"></div>';
  document.getElementById('chatHistory').appendChild(el);
  return el.querySelector('.ch-text');
}
function insertScanLine(){
  const sc=document.createElement('div');
  sc.className='live-scan';
  sc.innerHTML='<div class="bar"></div>';
  document.getElementById('chatHistory').appendChild(sc);
  // Fade in after next frame
  requestAnimationFrame(()=>sc.classList.add('visible'));
  return sc;
}

// Show the latest SARA message as a toast when drawer is closed
function showToast(text){
  const toast=document.getElementById('saraToast');
  document.getElementById('toastText').textContent=text;
  toast.classList.add('visible');
}
function hideToast(){
  document.getElementById('saraToast').classList.remove('visible');
}

// ═══════ FAB + DRAWER ═══════
const fab=document.getElementById('fab');
const fabIcon=document.getElementById('fabIcon');

function openDrawer(forRecording){
  if(open) return;
  open=true;
  document.body.classList.add('drawer-open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('scrim').classList.add('on');
  hideToast();
  if(!forRecording){
    fab.classList.add('close-mode');
    fabIcon.textContent='close';
  }
  // Map shifts up via CSS transform — see body.drawer-open #map
  // Smooth scroll to bottom after drawer opens
  setTimeout(()=>{
    const ch=document.getElementById('chatHistory');
    ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});
  },100);
}
function closeDrawer(){
  if(!open) return;
  open=false;
  document.body.classList.remove('drawer-open');
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('on');
  // Map shifts back via CSS transform removal
  // Reset FAB
  fab.classList.remove('close-mode','active','processing');
  fabIcon.textContent='mic';
  // Show toast with latest SARA message
  const saraMsgs=msgs.filter(m=>m.r==='sara');
  if(saraMsgs.length>0) showToast(saraMsgs[saraMsgs.length-1].t);
}

// Scrim tap closes
document.getElementById('scrim').addEventListener('click',closeDrawer);
// Toast tap opens history
document.getElementById('saraToast').addEventListener('click',()=>{if(!open)openDrawer(false)});
// Keyboard button opens drawer
document.querySelector('.bottom-controls .btn-icon').addEventListener('click',()=>{if(!open)openDrawer(false)});

// Drag bar — pull up gesture to open drawer
const dragBar=document.getElementById('dragBar');
let dragStartY=0;
dragBar.addEventListener('touchstart',e=>{dragStartY=e.touches[0].clientY},{passive:true});
dragBar.addEventListener('touchmove',e=>{
  if(dragStartY-e.touches[0].clientY>40 && !open) openDrawer(false);
},{passive:true});

// Swipe down on handle
let sy=0;
const ha=document.getElementById('handleArea');
ha.addEventListener('touchstart',e=>{sy=e.touches[0].clientY},{passive:true});
ha.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>50)closeDrawer()},{passive:true});

// FAB tap — if in close-mode, close drawer. Otherwise ignore (PTT is hold, not tap)
fab.addEventListener('click',()=>{
  if(fab.classList.contains('close-mode')) closeDrawer();
});

// ═══════ PTT via FAB ═══════
let processing=false;

function startRec(){
  if(recording||processing||demoIdx>=exchanges.length) return;
  recording=true;

  fab.classList.remove('close-mode');
  fab.classList.add('active');
  fabIcon.textContent='mic';

  if(!open) openDrawer(true);

  const ex=exchanges[demoIdx];
  const uW=ex.user;
  const ch=document.getElementById('chatHistory');

  // Append user message (includes waveform inside it)
  const textEl=appendUserMsg();

  // Smooth scroll
  setTimeout(()=>ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'}),50);

  // Start word-by-word after drawer is open
  setTimeout(()=>{
    if(!recording) return;
    let wi=0;
    wt=setInterval(()=>{
      if(wi<uW.length){
        const s=document.createElement('span');s.className='w';
        s.textContent=(wi>0?' ':'')+uW[wi];
        textEl.appendChild(s);wi++;
        // Smooth scroll every 3rd word to avoid constant scrolling
        if(wi%3===0) ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});
      } else {
        clearInterval(wt);wt=null;
        ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});
        setTimeout(()=>{ if(recording) stopRec(); },600);
      }
    },220);
  },400);
}

async function stopRec(){
  if(!recording) return;
  recording=false;
  processing=true;
  if(wt){clearInterval(wt);wt=null}

  const ex=exchanges[demoIdx];
  const uW=ex.user;
  const sW=ex.sara;
  const ch=document.getElementById('chatHistory');

  // FAB processing
  fab.classList.remove('active');
  fab.classList.add('processing');
  fabIcon.textContent='pending';

  // Fill remaining user words
  const userMsgs=ch.querySelectorAll('.ch-msg.user');
  const lastUserMsg=userMsgs[userMsgs.length-1];
  const textEl=lastUserMsg.querySelector('.ch-text');
  const have=textEl.querySelectorAll('.w').length;
  for(let i=have;i<uW.length;i++){
    const s=document.createElement('span');s.className='w';
    s.textContent=(i>0?' ':'')+uW[i];textEl.appendChild(s);
  }

  // Step 1: Fade waveform (opacity only — no layout shift)
  const wf=lastUserMsg.querySelector('.live-waveform');
  if(wf) wf.classList.add('off');
  await wait(350);

  // Step 2: Dim user text
  lastUserMsg.classList.add('dimmed');
  await wait(200);

  // Step 3: Scan line sweeps
  const scan=insertScanLine();
  await wait(1400);
  // Fade out scan
  scan.classList.remove('visible');
  await wait(300);
  scan.remove();

  // Step 4: SARA responds
  fab.classList.remove('processing');
  fabIcon.textContent='volume_up';

  const saraTextEl=appendSaraMsg();
  ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});

  // Drip SARA words
  await new Promise(resolve=>{
    let si=0;
    const timer=setInterval(()=>{
      if(si<sW.length){
        const s=document.createElement('span');s.className='w';
        s.textContent=(si>0?' ':'')+sW[si];saraTextEl.appendChild(s);si++;
        if(si%3===0) ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});
      } else {
        clearInterval(timer);
        ch.scrollTo({top:ch.scrollHeight,behavior:'smooth'});
        resolve();
      }
    },120);
  });

  // Step 5: Done
  msgs.push({r:'user',t:uW.join(' ')});
  msgs.push({r:'sara',t:sW.join(' ')});

  if(typeof execMapAction==='function') execMapAction(exchanges[demoIdx].mapAction);

  demoIdx++;
  processing=false;
  fabIcon.textContent='mic';
}

// FAB — PRESS AND HOLD (walkie-talkie)
// touchstart/mousedown = start recording
// touchend/mouseup = stop recording
// click = close drawer if in close-mode (handled above)
fab.addEventListener('touchstart',e=>{
  if(fab.classList.contains('close-mode')) return;
  e.preventDefault();
  startRec();
},{passive:false});
fab.addEventListener('touchend',e=>{
  if(fab.classList.contains('close-mode')) return;
  e.preventDefault();
  stopRec();
},{passive:false});
fab.addEventListener('mousedown',e=>{
  if(fab.classList.contains('close-mode')) return;
  e.preventDefault();
  startRec();
});
fab.addEventListener('mouseup',e=>{
  if(fab.classList.contains('close-mode')) return;
  e.preventDefault();
  stopRec();
});

// ═══════ INIT ═══════
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════ MAP — Leaflet with satellite tiles ═══════
const map = L.map('map', {
  center: [34.1478, -118.1445], // Pasadena area
  zoom: 17,
  zoomControl: false,
  attributionControl: false,
});

// Esri World Imagery — free satellite tiles, no API key
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
}).addTo(map);

// ═══════ DRONE — rotatable icon ═══════
let droneHeading = 315; // initial heading: NW (search pattern direction)
function makeDroneIcon(heading) {
  return L.divIcon({
    className: '',
    html: `<div style="width:36px;height:36px;position:relative">
      <div style="position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.12);animation:dronePulse 2s ease infinite"></div>
      <div style="width:36px;height:36px;background:rgba(255,255,255,.92);border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.5),0 0 24px rgba(0,0,0,.2);position:relative;z-index:2">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#111;transform:rotate(${heading}deg)"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
      </div>
    </div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
}

// Inject drone pulse animation
const pulseStyle = document.createElement('style');
pulseStyle.textContent = '@keyframes dronePulse{0%,100%{transform:scale(1);opacity:.12}50%{transform:scale(1.6);opacity:0}}';
document.head.appendChild(pulseStyle);

const droneMarker = L.marker(DRONE_START, { icon: makeDroneIcon(droneHeading), zIndexOffset: 1000 }).addTo(map);

function rotateDrone(heading) {
  droneHeading = heading;
  droneMarker.setIcon(makeDroneIcon(heading));
}

// ═══════ SEARCH ZONE — the authorized search boundary ═══════
const searchZone = L.circle(DRONE_START, {
  radius: 200,
  color: 'rgba(255,255,255,.5)',
  weight: 1.5,
  dashArray: '8,6',
  fillColor: 'rgba(0,0,0,.1)',
  fillOpacity: 1,
}).addTo(map);

// Search zone label
const szLabel = L.divIcon({
  className: '',
  html: '<div style="font-family:var(--mono);font-size:9px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.8)">SEARCH ZONE</div>',
  iconSize: [80, 14],
  iconAnchor: [40, -6],
});
const szLabelMarker = L.marker([DRONE_START[0] + 0.0018, DRONE_START[1]], { icon: szLabel, interactive: false }).addTo(map);

// ═══════ FLIGHT PATH TRAIL ═══════
const flightPath = [DRONE_START];
const trailLine = L.polyline(flightPath, {
  color: 'rgba(255,255,255,.25)',
  weight: 1.5,
  dashArray: '4,4',
}).addTo(map);

function extendTrail(newPos) {
  flightPath.push(newPos);
  trailLine.setLatLngs(flightPath);
}

// ═══════ WAYPOINT MARKER ═══════
let waypointMarker = null;
let waypointLabel = null;

function addWaypoint(latlng, label) {
  // Crosshair waypoint icon
  const wpIcon = L.divIcon({
    className: '',
    html: `<div style="width:20px;height:20px;position:relative">
      <div style="position:absolute;top:0;left:9px;width:2px;height:20px;background:rgba(255,255,255,.5)"></div>
      <div style="position:absolute;top:9px;left:0;width:20px;height:2px;background:rgba(255,255,255,.5)"></div>
      <div style="position:absolute;top:6px;left:6px;width:8px;height:8px;border:1.5px solid rgba(255,255,255,.6);border-radius:50%"></div>
    </div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });
  waypointMarker = L.marker(latlng, { icon: wpIcon, interactive: false }).addTo(map);

  const wpLabel = L.divIcon({
    className: '',
    html: `<div style="font-family:var(--mono);font-size:8px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.8);background:rgba(0,0,0,.4);padding:2px 5px;border-radius:2px">${label}</div>`,
    iconSize: [120, 14],
    iconAnchor: [60, -14],
  });
  waypointLabel = L.marker(latlng, { icon: wpLabel, interactive: false }).addTo(map);
}

// ═══════ TARGET MARKER + ORBIT ═══════
let targetMarker = null;
let orbitCircle = null;
let targetLabel = null;

function addTarget(latlng, label) {
  // Pulsing red target dot
  const tIcon = L.divIcon({
    className: '',
    html: `<div style="width:20px;height:20px;position:relative">
      <div style="position:absolute;inset:2px;border-radius:50%;background:rgba(184,84,84,.2);animation:targetPulse 1.5s ease infinite"></div>
      <div style="width:16px;height:16px;margin:2px;background:rgba(184,84,84,.9);border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(184,84,84,.5);position:relative;z-index:2"></div>
    </div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });
  targetMarker = L.marker(latlng, { icon: tIcon, interactive: false, zIndexOffset: 900 }).addTo(map);

  // Orbit circle
  orbitCircle = L.circle(latlng, {
    radius: 20,
    color: 'rgba(184,84,84,.6)',
    weight: 1.5,
    dashArray: '4,4',
    fillColor: 'rgba(184,84,84,.05)',
    fillOpacity: 1,
  }).addTo(map);

  // Target label
  const tLabel = L.divIcon({
    className: '',
    html: `<div style="font-family:var(--mono);font-size:8px;font-weight:600;color:rgba(184,84,84,.8);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.8);background:rgba(0,0,0,.5);padding:2px 5px;border-radius:2px">${label}</div>`,
    iconSize: [100, 14],
    iconAnchor: [50, -14],
  });
  targetLabel = L.marker(latlng, { icon: tLabel, interactive: false }).addTo(map);
}

// Target pulse animation
const targetStyle = document.createElement('style');
targetStyle.textContent = '@keyframes targetPulse{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(2.2);opacity:0}}';
document.head.appendChild(targetStyle);

// ═══════ TELEMETRY UPDATE ═══════
function updateTelem(key, value) {
  // Find the telem span by content
  const spans = document.querySelectorAll('.topbar .telem span');
  spans.forEach(s => {
    if (s.textContent.includes(key)) {
      const tv = s.querySelector('.tv');
      if (tv) tv.textContent = value;
    }
  });
}

// ═══════ MAP ACTIONS — called after each SARA response ═══════
function execMapAction(action) {
  if (!action) return;

  switch(action) {
    case 'flyToIntersection': {
      // Fly to Washington & Dupont
      // Calculate heading from current position to target
      const from = droneMarker.getLatLng();
      const angle = Math.atan2(
        WASHINGTON_DUPONT[1] - from.lng,
        WASHINGTON_DUPONT[0] - from.lat
      ) * 180 / Math.PI;
      rotateDrone(90 - angle); // convert math angle to compass

      map.flyTo(WASHINGTON_DUPONT, 18, {duration:2.5});
      droneMarker.setLatLng(WASHINGTON_DUPONT);
      extendTrail(WASHINGTON_DUPONT);

      // Add waypoint
      addWaypoint(WASHINGTON_DUPONT, 'WASHINGTON & DUPONT');

      // Remove search zone label (no longer doing sweep)
      map.removeLayer(szLabelMarker);
      // Fade search zone
      searchZone.setStyle({ opacity: 0.2, fillOpacity: 0.3 });
      break;
    }

    case 'zoomIn': {
      // Descending — zoom in, update telemetry
      map.flyTo(map.getCenter(), 19, {duration:1.5});
      updateTelem('ALT', '60m');
      // Drone hovers, slight rotation to survey
      rotateDrone(45);
      break;
    }

    case 'targetAcquired': {
      // Target found — place target slightly offset from drone
      const pos = droneMarker.getLatLng();
      const tPos = [pos.lat + 0.00015, pos.lng - 0.00008];

      // Remove waypoint, replace with target
      if (waypointMarker) { map.removeLayer(waypointMarker); map.removeLayer(waypointLabel); }

      addTarget(tPos, 'TARGET — RED SUV');

      // Move drone to orbit position (NE of target)
      const orbitPos = [tPos[0] + 0.0001, tPos[1] + 0.00012];
      droneMarker.setLatLng(orbitPos);
      extendTrail(orbitPos);

      // Point drone toward target
      const a = Math.atan2(tPos[1] - orbitPos[1], tPos[0] - orbitPos[0]) * 180 / Math.PI;
      rotateDrone(90 - a);

      // Remove search zone entirely
      map.removeLayer(searchZone);

      // Update telem
      updateTelem('PROG', 'ORBIT');
      break;
    }

    case 'followVehicle': {
      // Vehicle moves south, drone follows
      const curr = droneMarker.getLatLng();
      const tCurr = targetMarker ? targetMarker.getLatLng() : curr;
      // Move target south
      const newTPos = [tCurr.lat - 0.0004, tCurr.lng + 0.0001];
      if (targetMarker) targetMarker.setLatLng(newTPos);
      if (orbitCircle) orbitCircle.setLatLng(newTPos);
      if (targetLabel) targetLabel.setLatLng(newTPos);
      // Drone follows
      const newDPos = [newTPos[0] + 0.0001, newTPos[1] + 0.00012];
      droneMarker.setLatLng(newDPos);
      extendTrail(newDPos);
      // Pan map to follow
      map.flyTo(newTPos, map.getZoom(), {duration:2});
      // Rotate drone to face south (direction of travel)
      rotateDrone(180);
      // Update target label
      if (targetLabel) {
        map.removeLayer(targetLabel);
        const tl = L.divIcon({
          className: '',
          html: '<div style="font-family:var(--mono);font-size:8px;font-weight:600;color:rgba(184,84,84,.8);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.8);background:rgba(0,0,0,.5);padding:2px 5px;border-radius:2px">TARGET — MOVING S</div>',
          iconSize: [110, 14],
          iconAnchor: [55, -14],
        });
        targetLabel = L.marker(newTPos, { icon: tl, interactive: false }).addTo(map);
      }
      // Update telemetry
      updateTelem('PROG', 'TRACKING');
      break;
    }
  }
}
</script>
